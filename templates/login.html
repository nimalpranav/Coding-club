<!DOCTYPE html>

<html>
<head>
    <title>Coding Club Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="auth-container">

```
<div class="auth-card">

    <h1>Coding Club</h1>
    <h2>Student Login</h2>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for msg in messages %}
                <div class="alert">{{ msg }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST">

        <input
            type="text"
            name="username"
            placeholder="Username"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Password"
            required
        >

        <button type="submit">
            Login
        </button>

    </form>

    <p>
        Don't have an account?
        <a href="{{ url_for('register') }}">
            Register
        </a>
    </p>

    <p>
        <a href="{{ url_for('admin_login') }}">
            Admin Login
        </a>
    </p>

</div>
```

</div>

</body>
</html>
